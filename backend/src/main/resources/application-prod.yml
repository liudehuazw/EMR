server:
  port: 8080
  servlet:
    context-path: /api

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

# MyBatis-Plus configuration
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:mapper/*.xml

# JWT configuration
jwt:
  secret: ${JWT_SECRET:emr-secret-key-2024-medical-record-system}
  expiration: 86400000  # 24 hours

# File upload configuration
file:
  upload-path: ${FILE_UPLOAD_PATH:/opt/Electronic-medical-record/uploads}
  max-size: 52428800  # 50MB

# OCR service configuration
ocr:
  service:
    url: http://localhost:8000
    timeout: 720000  # 12分钟（7页PDF在2GB服务器上需要~10分钟）

# Zhipu AI configuration
zhipu:
  ai:
    api-key: ${ZHIPU_API_KEY}
    api-url: https://open.bigmodel.cn/api/paas/v4/chat/completions
    model: glm-4-flash
    timeout: 60000

# Alibaba Cloud OSS configuration
aliyun:
  oss:
    endpoint: ${ALIYUN_OSS_ENDPOINT}
    access-key-id: ${ALIYUN_OSS_ACCESS_KEY_ID}
    access-key-secret: ${ALIYUN_OSS_ACCESS_KEY_SECRET}
    bucket-name: ${ALIYUN_OSS_BUCKET_NAME}

# Logging configuration
logging:
  level:
    com.medical.emr: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: /opt/logs/emr.log
